# HA Device Summary — Beispiele (nach HACS-Installation)

# Standard: Stockwerk → Räume, Badges, „offen“ = on
type: custom:ha-device-summary

# --- Gebäude-Filter über Floor-Liste (empfohlen, eindeutig) ---
# type: custom:ha-device-summary
# title: Gebäude A
# building_floor_ids:
#   - erdgeschoss
#   - obergeschoss
# group_by: floor
# show_devices: true

# --- Gebäude-Filter über Text (wenn Floor building/name/alias gepflegt) ---
# type: custom:ha-device-summary
# building: gebaeude_a
# group_by: both
# show_devices: true

# --- Nur Raum (flache Liste nach Bereich) ---
# type: custom:ha-device-summary
# group_by: area
# show_devices: true

# --- Nur Zahlen, ohne Badges ---
# type: custom:ha-device-summary
# group_by: both
# show_devices: false
